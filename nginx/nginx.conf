worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;
    client_max_body_size 50M;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    proxy_cache_path /var/cache/nginx keys_zone=token_cache:10m;

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream backend_auth_service       { server auth-service:3005; }
    upstream backend_academic_service   { server academic-service:3003; }
    upstream backend_asset_service      { server asset-service:3004; }
    upstream backend_learning_service   { server learning-service:3006; }
    upstream backend_student_service    { server student-service:3008; }
    upstream backend_vocational_service { server vocational-service:3007; }
    upstream frontend                   { server frontend:5173; }

    server {
        listen 80;
        server_name localhost;

        # CORS Headers - satu sumber kebenaran (tidak duplikat dari service)
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Disposition' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        location /health {
            return 200 '{"status":"OK","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        location = /auth-verify {
            internal;
            proxy_pass http://auth-service:3005/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_cache token_cache;
            proxy_cache_key "$http_authorization";
            proxy_cache_valid 200 5m;
            proxy_cache_valid 401 403 0s;
        }

        location = /error401 {
            default_type application/json;
            return 401 '{"error":"Unauthorized","message":"Token tidak valid atau tidak ditemukan"}';
        }
        location = /error403 {
            default_type application/json;
            return 403 '{"error":"Forbidden","message":"Akses ditolak"}';
        }

        # Auth Service (tanpa proteksi)
        location /api/auth {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth-service:3005;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── PUBLIC STATIC FILES (no auth required for media/uploads) ────────────
        # Academic service uploads (foto parenting, kebersihan, dll)
        location /api/academic/uploads/ {
            proxy_pass http://academic-service:3003/uploads/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Vocational service uploads (foto PKL, silabus pramuka, laporan, dll)
        location /api/vocational/uploads/ {
            proxy_pass http://vocational-service:3007/uploads/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Academic Service
        location /api/academic {
            auth_request /auth-verify;
            error_page 401 =401 /error401;
            error_page 403 =403 /error403;

            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;

            proxy_set_header X-User-Id    $auth_user_id;
            proxy_set_header X-User-Role  $auth_user_role;
            proxy_set_header Authorization $http_authorization;

            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://academic-service:3003;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Asset Service
        location /api/asset {
            auth_request /auth-verify;
            error_page 401 =401 /error401;
            error_page 403 =403 /error403;

            proxy_set_header Authorization $http_authorization;

            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://asset-service:3004;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Learning Service
        location /api/learning {
            auth_request /auth-verify;
            error_page 401 =401 /error401;
            error_page 403 =403 /error403;

            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;

            proxy_set_header X-User-Id    $auth_user_id;
            proxy_set_header X-User-Role  $auth_user_role;
            proxy_set_header Authorization $http_authorization;

            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://learning-service:3006;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Untuk upload file besar (perangkat pembelajaran)
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Student Service
        location /api/student {
            auth_request /auth-verify;
            error_page 401 =401 /error401;
            error_page 403 =403 /error403;

            proxy_set_header Authorization $http_authorization;

            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://student-service:3008;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Vocational Service
        location /api/vocational {
            auth_request /auth-verify;
            error_page 401 =401 /error401;
            error_page 403 =403 /error403;

            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;

            proxy_set_header X-User-Id    $auth_user_id;
            proxy_set_header X-User-Role  $auth_user_role;
            proxy_set_header Authorization $http_authorization;

            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://vocational-service:3007;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}