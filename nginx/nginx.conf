worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    client_max_body_size 50M;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types application/json text/plain text/css application/javascript application/xml;
    gzip_min_length 1000;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    proxy_cache_path /var/cache/nginx keys_zone=token_cache:10m max_size=100m inactive=10m use_temp_path=off;

    upstream backend_auth_service {
        server auth-service:3005;
        keepalive 32;
    }

    upstream backend_academic_service {
        server academic-service:3003;
        keepalive 32;
    }

    upstream backend_asset_service {
        server asset-service:3004;
        keepalive 32;
    }

    upstream backend_learning_service {
        server learning-service:3006;
        keepalive 32;
    }

    upstream backend_student_service {
        server student-service:3008;
        keepalive 32;
    }

    upstream backend_vocational_service {
        server vocational-service:3007;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:5173;
        keepalive 16;
    }

    server {
        listen 80;
        server_name localhost;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Disposition' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location /health {
            default_type application/json;
            return 200 '{"status":"OK","service":"api-gateway"}';
        }

        location = /auth-verify {
            internal;

            proxy_pass http://backend_auth_service/api/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;

            proxy_cache token_cache;
            proxy_cache_key "$http_authorization";
            proxy_cache_valid 200 5m;
            proxy_cache_valid 401 403 1s;
            proxy_cache_use_stale off;
        }

        location = /error401 {
            default_type application/json;
            return 401 '{"error":"Unauthorized","message":"Token tidak valid atau tidak ditemukan"}';
        }

        location = /error403 {
            default_type application/json;
            return 403 '{"error":"Forbidden","message":"Akses ditolak"}';
        }

        location /api/auth/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_auth_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/academic/ {
            auth_request /auth-verify;
            error_page 401 = /error401;
            error_page 403 = /error403;

            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;

            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;
            proxy_set_header Authorization $http_authorization;

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_academic_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /api/asset/ {
            auth_request /auth-verify;
            error_page 401 = /error401;
            error_page 403 = /error403;

            proxy_set_header Authorization $http_authorization;

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_asset_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/learning/ {
            auth_request /auth-verify;
            error_page 401 = /error401;
            error_page 403 = /error403;

            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;

            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;
            proxy_set_header Authorization $http_authorization;

            limit_req zone=api_limit burst=40 nodelay;

            proxy_pass http://backend_learning_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location /api/student/ {
            auth_request /auth-verify;
            error_page 401 = /error401;
            error_page 403 = /error403;

            proxy_set_header Authorization $http_authorization;

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_student_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /api/vocational/ {
            auth_request /auth-verify;
            error_page 401 = /error401;
            error_page 403 = /error403;

            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;

            proxy_set_header X-User-Id $auth_user_id;
            proxy_set_header X-User-Role $auth_user_role;
            proxy_set_header Authorization $http_authorization;

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_vocational_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}