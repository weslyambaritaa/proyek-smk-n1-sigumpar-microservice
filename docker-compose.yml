x-service-template: &service-template
  restart: unless-stopped
  networks:
    - microservices-network
  privileged: true

services:
  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    networks:
      - microservices-network
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpassword
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - microservices-network
    volumes:
      - ./keycloak-init/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    command: start-dev --import-realm

  auth-service:
    <<: *service-template
    build: ./backend/auth-service
    container_name: auth-service
    environment:
      NODE_ENV: development
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
      PORT: 3005
      DB_NAME: keycloak
      DB_USER: keycloak
      DB_HOST: keycloak-db
      DB_PASSWORD: keycloakpassword
      DB_PORT: 5432
      DATABASE_URL: postgres://keycloak:keycloakpassword@keycloak-db:5432/keycloak
    depends_on:
      - keycloak-db
      - keycloak

  academic-service:
    <<: *service-template
    build: ./backend/academic-service
    container_name: academic-service
    environment:
      NODE_ENV: development
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
      PORT: 3003
      DB_NAME: academic_db
      DB_USER: academic_user
      DB_HOST: localhost
      DB_PASSWORD: password
      DB_PORT: 5432
      DATABASE_URL: postgres://academic_user:password@localhost:5432/academic_db
    depends_on:
      - keycloak

  learning-service:
    <<: *service-template
    build: ./backend/learning-service
    container_name: learning-service
    environment:
      NODE_ENV: development
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
      PORT: 3006
      DB_NAME: learning_db
      DB_USER: learning_user
      DB_HOST: localhost
      DB_PASSWORD: password
      DB_PORT: 5432
      DATABASE_URL: postgres://learning_user:password@localhost:5432/learning_db
    depends_on:
      - keycloak

  student-service:
    <<: *service-template
    build: ./backend/student-service
    container_name: student-service
    environment:
      NODE_ENV: development
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
      PORT: 3008
      DB_NAME: student_db
      DB_USER: student_user
      DB_HOST: localhost
      DB_PASSWORD: password
      DB_PORT: 5432
      DATABASE_URL: postgres://student_user:password@localhost:5432/student_db
      ACADEMIC_SERVICE_URL: http://academic-service:3003
    depends_on:
      - keycloak
      - academic-service

  vocational-service:
    <<: *service-template
    build: ./backend/vocational-service
    container_name: vocational-service
    environment:
      NODE_ENV: development
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
      PORT: 3007
      DB_NAME: vocational_db
      DB_USER: vocational_user
      DB_HOST: localhost
      DB_PASSWORD: password
      DB_PORT: 5432
      DATABASE_URL: postgres://vocational_user:password@localhost:5432/vocational_db
      ACADEMIC_SERVICE_URL: http://academic-service:3003
    depends_on:
      - keycloak
      - academic-service

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - microservices-network
    depends_on:
      - auth-service
      - academic-service
      - learning-service
      - student-service
      - vocational-service

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: smk-sigumpar
      VITE_KEYCLOAK_CLIENT_ID: smk-sigumpar
      VITE_API_URL: http://localhost:8001
    networks:
      - microservices-network
    depends_on:
      - keycloak
      - api-gateway

networks:
  microservices-network:
    driver: bridge

volumes:
  keycloak_db_data:
