x-service-template: &service-template
  restart: unless-stopped
  networks:
    - microservices-network
  privileged: true
  environment:
    - NODE_ENV=production
    - KEYCLOAK_URL=http://keycloak:8080
    - KEYCLOAK_REALM=smk-sigumpar
    - KEYCLOAK_CLIENT_ID=smk-sigumpar
    - DB_PASSWORD=password

services:
  # ── KEYCLOAK DATABASE ────────────────────────────────────────────────────
  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    networks:
      - microservices-network
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── KEYCLOAK (Auth Provider) ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpassword
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    command: start-dev
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - microservices-network
    volumes:
      - ./keycloak-init:/opt/keycloak/data/import
    # Diperpanjang: Keycloak butuh 2-3 menit untuk startup penuh
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  # ── AUTH SERVICE ─────────────────────────────────────────────────────────
  auth-service:
    <<: *service-template
    build: ./backend/auth-service
    container_name: auth-service
    environment:
      - PORT=3005
      - DB_NAME=auth_db
      - DB_USER=auth_user
      - DB_HOST=localhost
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://auth_user:password@localhost:5432/auth_db
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=smk-sigumpar
    # Tidak lagi tunggu keycloak healthy - auth-service punya retry sendiri
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── ACADEMIC SERVICE ─────────────────────────────────────────────────────
  academic-service:
    <<: *service-template
    build: ./backend/academic-service
    container_name: academic-service
    environment:
      - PORT=3003
      - DB_NAME=academic_db
      - DB_USER=academic_user
      - DB_HOST=localhost
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://academic_user:password@localhost:5432/academic_db
    # Tidak tunggu keycloak - auth dihandle oleh nginx gateway
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── ASSET SERVICE ────────────────────────────────────────────────────────
  asset-service:
    <<: *service-template
    build: ./backend/asset-service
    container_name: asset-service
    environment:
      - PORT=3004
      - DB_NAME=asset_db
      - DB_USER=asset_user
      - DB_HOST=localhost
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://asset_user:password@localhost:5432/asset_db
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── LEARNING SERVICE ─────────────────────────────────────────────────────
  learning-service:
    <<: *service-template
    build: ./backend/learning-service
    container_name: learning-service
    environment:
      - PORT=3006
      - DB_NAME=learning_db
      - DB_USER=learning_user
      - DB_HOST=localhost
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://learning_user:password@localhost:5432/learning_db
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3006/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── STUDENT SERVICE ──────────────────────────────────────────────────────
  student-service:
    <<: *service-template
    build: ./backend/student-service
    container_name: student-service
    environment:
      - PORT=3008
      - DB_NAME=student_db
      - DB_USER=student_user
      - DB_HOST=localhost
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://student_user:password@localhost:5432/student_db
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3008/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── VOCATIONAL SERVICE ───────────────────────────────────────────────────
  vocational-service:
    <<: *service-template
    build: ./backend/vocational-service
    container_name: vocational-service
    environment:
      - PORT=3007
      - DB_NAME=vocational_db
      - DB_USER=vocational_user
      - DB_HOST=localhost
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://vocational_user:password@localhost:5432/vocational_db
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3007/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── API GATEWAY (Nginx) ──────────────────────────────────────────────────
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - microservices-network
    depends_on:
      auth-service:
        condition: service_healthy
      academic-service:
        condition: service_healthy
      learning-service:
        condition: service_healthy
      vocational-service:
        condition: service_healthy
      asset-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FRONTEND ─────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_KEYCLOAK_URL=http://localhost:8080
      - VITE_KEYCLOAK_REALM=smk-sigumpar
      - VITE_KEYCLOAK_CLIENT_ID=smk-sigumpar
      - VITE_API_URL=http://localhost:8001
    networks:
      - microservices-network
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped

networks:
  microservices-network:
    driver: bridge

volumes:
  keycloak_db_data:
