x-service-template: &service-template
  restart: unless-stopped
  networks:
    - microservices-network
  environment:
    - NODE_ENV=development
    - KEYCLOAK_URL=http://keycloak:8080
    - KEYCLOAK_REALM=smk-sigumpar
    - KEYCLOAK_CLIENT_ID=smk-sigumpar
    - DB_PASSWORD=password
    - DB_HOST=postgres        # ✅ FIX: pakai nama service postgres, bukan localhost

services:

  # ── POSTGRESQL (SATU SERVER UNTUK SEMUA SERVICE) ─────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── KEYCLOAK DATABASE ────────────────────────────────────────────────────
  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    networks:
      - microservices-network
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── KEYCLOAK ─────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpassword
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - microservices-network
    volumes:
      - ./keycloak-init/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    command: start-dev --import-realm

  # ── AUTH SERVICE ─────────────────────────────────────────────────────────
  auth-service:
    <<: *service-template
    build: ./backend/auth-service
    container_name: auth-service
    environment:
      - PORT=3005
      - DB_NAME=auth_db
      - DB_USER=auth_user
      - DB_HOST=postgres           # ✅ FIX
      - DB_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  # ── ACADEMIC SERVICE ─────────────────────────────────────────────────────
  academic-service:
    <<: *service-template
    build: ./backend/academic-service
    container_name: academic-service
    environment:
      - PORT=3003
      - DB_NAME=academic_db
      - DB_USER=academic_user
      - DB_HOST=postgres           # ✅ FIX
      - DB_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  # ── ASSET SERVICE ────────────────────────────────────────────────────────
  asset-service:
    <<: *service-template
    build: ./backend/asset-service
    container_name: asset-service
    environment:
      - PORT=3004
      - DB_NAME=asset_db
      - DB_USER=asset_user
      - DB_HOST=postgres           # ✅ FIX
      - DB_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  # ── LEARNING SERVICE ─────────────────────────────────────────────────────
  learning-service:
    <<: *service-template
    build: ./backend/learning-service
    container_name: learning-service
    environment:
      - PORT=3006
      - DB_NAME=learning_db
      - DB_USER=learning_user
      - DB_HOST=postgres           # ✅ FIX
      - DB_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  # ── STUDENT SERVICE ──────────────────────────────────────────────────────
  student-service:
    <<: *service-template
    build: ./backend/student-service
    container_name: student-service
    environment:
      - PORT=3008
      - DB_NAME=student_db
      - DB_USER=student_user
      - DB_HOST=postgres           # ✅ FIX
      - DB_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  # ── VOCATIONAL SERVICE ───────────────────────────────────────────────────
  vocational-service:
    <<: *service-template
    build: ./backend/vocational-service
    container_name: vocational-service
    environment:
      - PORT=3007
      - DB_NAME=vocational_db
      - DB_USER=vocational_user
      - DB_HOST=postgres           # ✅ FIX
      - DB_PASSWORD=password
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  # ── API GATEWAY (Nginx) ──────────────────────────────────────────────────
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - microservices-network
    depends_on:
      - auth-service
      - academic-service
      - asset-service
      - learning-service
      - student-service
      - vocational-service

  # ── FRONTEND ─────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_KEYCLOAK_URL=http://localhost:8080
      - VITE_KEYCLOAK_REALM=smk-sigumpar
      - VITE_KEYCLOAK_CLIENT_ID=smk-sigumpar
      - VITE_API_URL=http://localhost:8001
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  keycloak_db_data:
  postgres_data:     # ✅ FIX: volume untuk postgres baru