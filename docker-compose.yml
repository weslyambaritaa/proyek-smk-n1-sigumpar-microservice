version: "3.9"

services:

  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - microservices-network

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpassword
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - microservices-network

  auth-service:
    build: ./backend/auth-service
    container_name: auth-service
    environment:
      PORT: 3005
    networks:
      - microservices-network

  academic-service:
    build: ./backend/academic-service
    container_name: academic-service
    environment:
      PORT: 3003
    networks:
      - microservices-network

  learning-service:
    build: ./backend/learning-service
    container_name: learning-service
    privileged: true
    environment:
      PORT: 3006
      DB_NAME=learning_db
      DB_USER=learning_user
      DB_PASSWORD=password
      ACADEMIC_SERVICE_URL: http://academic-service:3003
    networks:
      - microservices-network

  student-service:
    build: ./backend/student-service
    container_name: student-service
    environment:
      PORT: 3008
    networks:
      - microservices-network

  vocational-service:
    build: ./backend/vocational-service
    container_name: vocational-service
    environment:
      PORT: 3007
    networks:
      - microservices-network

  asset-service:
    build: ./backend/asset-service
    container_name: asset-service
    environment:
      PORT: 3004
    networks:
      - microservices-network

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - academic-service
      - learning-service
      - student-service
    networks:
      - microservices-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  keycloak_db_data: