x-service-template: &service-template
  restart: unless-stopped
  networks:
    - microservices-network
  privileged: true
  environment:
    - NODE_ENV=development
    - KEYCLOAK_URL=http://keycloak:8080
    - KEYCLOAK_REALM=smk-sigumpar
    - KEYCLOAK_CLIENT_ID=smk-sigumpar
    - DB_PASSWORD=password

services:
  # ── KEYCLOAK DATABASE ────────────────────────────────────────────────────
  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    networks:
      - microservices-network
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

  # ── SERVICE DATABASES ────────────────────────────────────────────────────
  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: password
    networks:
      - microservices-network
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  academic-db:
    image: postgres:15
    container_name: academic-db
    environment:
      POSTGRES_DB: academic_db
      POSTGRES_USER: academic_user
      POSTGRES_PASSWORD: password
    networks:
      - microservices-network
    volumes:
      - academic_db_data:/var/lib/postgresql/data

  asset-db:
    image: postgres:15
    container_name: asset-db
    environment:
      POSTGRES_DB: asset_db
      POSTGRES_USER: asset_user
      POSTGRES_PASSWORD: password
    networks:
      - microservices-network
    volumes:
      - asset_db_data:/var/lib/postgresql/data

  learning-db:
    image: postgres:15
    container_name: learning-db
    environment:
      POSTGRES_DB: learning_db
      POSTGRES_USER: learning_user
      POSTGRES_PASSWORD: password
    networks:
      - microservices-network
    volumes:
      - learning_db_data:/var/lib/postgresql/data

  student-db:
    image: postgres:15
    container_name: student-db
    environment:
      POSTGRES_DB: student_db
      POSTGRES_USER: student_user
      POSTGRES_PASSWORD: password
    networks:
      - microservices-network
    volumes:
      - student_db_data:/var/lib/postgresql/data

  vocational-db:
    image: postgres:15
    container_name: vocational-db
    environment:
      POSTGRES_DB: vocational_db
      POSTGRES_USER: vocational_user
      POSTGRES_PASSWORD: password
    networks:
      - microservices-network
    volumes:
      - vocational_db_data:/var/lib/postgresql/data

  # ── KEYCLOAK ─────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpassword
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - microservices-network
    volumes:
      - ./keycloak-init/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    command: start-dev --import-realm

  # ── AUTH SERVICE ─────────────────────────────────────────────────────────
  auth-service:
    <<: *service-template
    build: ./backend/auth-service
    container_name: auth-service
    environment:
      - PORT=3005
      - DB_NAME=auth_db
      - DB_USER=auth_user
      - DB_HOST=auth-db
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://auth_user:password@auth-db:5432/auth_db
    depends_on:
      - keycloak
      - auth-db

  # ── ACADEMIC SERVICE ─────────────────────────────────────────────────────
  academic-service:
    <<: *service-template
    build: ./backend/academic-service
    container_name: academic-service
    environment:
      - PORT=3003
      - DB_NAME=academic_db
      - DB_USER=academic_user
      - DB_HOST=academic-db
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://academic_user:password@academic-db:5432/academic_db
    depends_on:
      - keycloak
      - academic-db

  # ── ASSET SERVICE ────────────────────────────────────────────────────────
  asset-service:
    <<: *service-template
    build: ./backend/asset-service
    container_name: asset-service
    environment:
      - PORT=3004
      - DB_NAME=asset_db
      - DB_USER=asset_user
      - DB_HOST=asset-db
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://asset_user:password@asset-db:5432/asset_db
    depends_on:
      - keycloak
      - asset-db

  # ── LEARNING SERVICE ─────────────────────────────────────────────────────
  learning-service:
    <<: *service-template
    build: ./backend/learning-service
    container_name: learning-service
    environment:
      - PORT=3006
      - DB_NAME=learning_db
      - DB_USER=learning_user
      - DB_HOST=learning-db
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://learning_user:password@learning-db:5432/learning_db
    depends_on:
      - keycloak
      - learning-db

  # ── STUDENT SERVICE ──────────────────────────────────────────────────────
  student-service:
    <<: *service-template
    build: ./backend/student-service
    container_name: student-service
    environment:
      - PORT=3008
      - DB_NAME=student_db
      - DB_USER=student_user
      - DB_HOST=student-db
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://student_user:password@student-db:5432/student_db
    depends_on:
      - keycloak
      - student-db

  # ── VOCATIONAL SERVICE ───────────────────────────────────────────────────
  vocational-service:
    <<: *service-template
    build: ./backend/vocational-service
    container_name: vocational-service
    environment:
      - PORT=3007
      - DB_NAME=vocational_db
      - DB_USER=vocational_user
      - DB_HOST=vocational-db
      - DB_PASSWORD=password
      - DATABASE_URL=postgres://vocational_user:password@vocational-db:5432/vocational_db
    depends_on:
      - keycloak
      - vocational-db

  # ── API GATEWAY (Nginx) ──────────────────────────────────────────────────
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - microservices-network
    depends_on:
      - auth-service
      - academic-service
      - asset-service
      - learning-service
      - student-service
      - vocational-service

  # ── FRONTEND ─────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_KEYCLOAK_URL=http://localhost:8080
      - VITE_KEYCLOAK_REALM=smk-sigumpar
      - VITE_KEYCLOAK_CLIENT_ID=smk-sigumpar
      - VITE_API_URL=http://localhost:8001
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  keycloak_db_data:
  auth_db_data:
  academic_db_data:
  asset_db_data:
  learning_db_data:
  student_db_data:
  vocational_db_data: