x-db-template: &db-template
  image: postgres:15
  networks:
    - microservices-network
  restart: unless-stopped

x-service-template: &service-template
  restart: unless-stopped
  networks:
    - microservices-network
  environment:
    - NODE_ENV=production
    - KEYCLOAK_URL=http://keycloak:8080
    - KEYCLOAK_REALM=smk-sigumpar
    - KEYCLOAK_CLIENT_ID=backend-client

services:
  # ==========================================
  # KEYCLOAK SSO & DB
  # ==========================================
  keycloak-db:
    <<: *db-template
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpassword
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - microservices-network

  # ==========================================
  # 1. AUTH SERVICE
  # ==========================================
  auth-db:
    <<: *db-template
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: password
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./postgres-init/init-auth.sql:/docker-entrypoint-initdb.d/init.sql

  auth-service:
    <<: *service-template
    build: ./backend/auth-service
    container_name: auth-service
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://auth_user:password@auth-db:5432/auth_db
    depends_on:
      - auth-db
      - keycloak

  # ==========================================
  # 2. ACADEMIC SERVICE
  # ==========================================
  academic-db:
    <<: *db-template
    container_name: academic-db
    environment:
      POSTGRES_DB: academic_db
      POSTGRES_USER: academic_user
      POSTGRES_PASSWORD: password
    volumes:
      - academic_db_data:/var/lib/postgresql/data
      - ./postgres-init/init-academic.sql:/docker-entrypoint-initdb.d/init.sql

  academic-service:
    <<: *service-template
    build: ./backend/academic-service
    container_name: academic-service
    environment:
      - PORT=3002
      - DATABASE_URL=postgres://academic_user:password@academic-db:5432/academic_db
    depends_on:
      - academic-db
      - keycloak

  # ==========================================
  # 3. ASSET SERVICE
  # ==========================================
  asset-db:
    <<: *db-template
    container_name: asset-db
    environment:
      POSTGRES_DB: asset_db
      POSTGRES_USER: asset_user
      POSTGRES_PASSWORD: password
    volumes:
      - asset_db_data:/var/lib/postgresql/data
      - ./postgres-init/init-asset.sql:/docker-entrypoint-initdb.d/init.sql

  asset-service:
    <<: *service-template
    build: ./backend/asset-service
    container_name: asset-service
    environment:
      - PORT=3003
      - DATABASE_URL=postgres://asset_user:password@asset-db:5432/asset_db
    depends_on:
      - asset-db
      - keycloak

  # ==========================================
  # 4. LEARNING SERVICE
  # ==========================================
  learning-db:
    <<: *db-template
    container_name: learning-db
    environment:
      POSTGRES_DB: learning_db
      POSTGRES_USER: learning_user
      POSTGRES_PASSWORD: password
    volumes:
      - learning_db_data:/var/lib/postgresql/data
      - ./postgres-init/init-learning.sql:/docker-entrypoint-initdb.d/init.sql

  learning-service:
    <<: *service-template
    build: ./backend/learning-service
    container_name: learning-service
    environment:
      - PORT=3004
      - DATABASE_URL=postgres://learning_user:password@learning-db:5432/learning_db
    depends_on:
      - learning-db
      - keycloak

  # ==========================================
  # 5. STUDENT SERVICE
  # ==========================================
  student-db:
    <<: *db-template
    container_name: student-db
    environment:
      POSTGRES_DB: student_db
      POSTGRES_USER: student_user
      POSTGRES_PASSWORD: password
    volumes:
      - student_db_data:/var/lib/postgresql/data
      - ./postgres-init/init-student.sql:/docker-entrypoint-initdb.d/init.sql

  student-service:
    <<: *service-template
    build: ./backend/student-service
    container_name: student-service
    environment:
      - PORT=3005
      - DATABASE_URL=postgres://student_user:password@student-db:5432/student_db
    depends_on:
      - student-db
      - keycloak

  # ==========================================
  # 6. VOCATIONAL SERVICE
  # ==========================================
  vocational-db:
    <<: *db-template
    container_name: vocational-db
    environment:
      POSTGRES_DB: vocational_db
      POSTGRES_USER: vocational_user
      POSTGRES_PASSWORD: password
    volumes:
      - vocational_db_data:/var/lib/postgresql/data
      - ./postgres-init/init-vocational.sql:/docker-entrypoint-initdb.d/init.sql

  vocational-service:
    <<: *service-template
    build: ./backend/vocational-service
    container_name: vocational-service
    environment:
      - PORT=3006
      - DATABASE_URL=postgres://vocational_user:password@vocational-db:5432/vocational_db
    depends_on:
      - vocational-db
      - keycloak

  # ==========================================
  # API GATEWAY (NGINX) & FRONTEND
  # ==========================================
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - academic-service
      - asset-service
      - learning-service
      - student-service
      - vocational-service
    networks:
      - microservices-network

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    expose:
      - "5173"
    environment:
      - VITE_KEYCLOAK_URL=http://localhost:8080
      - VITE_KEYCLOAK_REALM=smk-sigumpar
      - VITE_KEYCLOAK_CLIENT_ID=frontend-client
    networks:
      - microservices-network
    depends_on:
      - api-gateway

networks:
  microservices-network:
    driver: bridge

volumes:
  keycloak_db_data:
  auth_db_data:
  academic_db_data:
  asset_db_data:
  learning_db_data:
  student_db_data:
  vocational_db_data: