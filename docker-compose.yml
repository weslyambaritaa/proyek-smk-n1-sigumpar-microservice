# docker-compose.yml
services:
  # ============================================================
  # SERVICE 1: Users Service
  # ============================================================
  users-service:
    # Build image dari Dockerfile di folder users-service
    build:
      context: ./backend/users-service
      dockerfile: Dockerfile

    # Nama container yang mudah diidentifikasi
    container_name: delcom-users-service

    # Restart otomatis jika service crash (kecuali di-stop manual)
    restart: unless-stopped

    # Variabel environment — bisa di-override dari file .env
    environment:
      - NODE_ENV=production
      - PORT=3001

    # Port: hanya expose ke jaringan Docker internal
    # Tidak di-expose ke host karena semua traffic masuk melalui Nginx
    expose:
      - "3001"

    # Volume: mount folder data ke host agar data persisten
    # Format: host_path:container_path
    volumes:
      - ./backend/users-service/src/data:/app/src/data

    # Hanya bergabung ke jaringan internal microservices
    networks:
      - delcom-microservices-network

    # Health check: Docker akan memonitor kesehatan service ini
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s   # Cek setiap 30 detik
      timeout: 10s    # Timeout jika tidak ada response dalam 10 detik
      retries: 3      # Nyatakan 'unhealthy' setelah 3 kali gagal

  # ============================================================
  # SERVICE 2: Todos Service
  # ============================================================
  todos-service:
    build:
      context: ./backend/todos-service
      dockerfile: Dockerfile
    container_name: delcom-todos-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
    expose:
      - "3002"
    volumes:
      - ./backend/todos-service/src/data:/app/src/data
    networks:
      - delcom-microservices-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # SERVICE 3: Nginx — API Gateway
  # ============================================================
  nginx:
    # Gunakan image Nginx resmi versi ringan (Alpine)
    image: nginx:alpine
    container_name: delcom-api-gateway
    restart: unless-stopped

    # Port mapping: host:container
    # Port 80 di mesin lokal diteruskan ke port 80 di container Nginx
    ports:
      - "8001:80"

    # Mount file konfigurasi Nginx dari host ke container
    # :ro = read-only, container tidak bisa mengubah file ini
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    # Nginx harus menunggu kedua service siap sebelum start
    depends_on:
      users-service:
        condition: service_healthy  # Tunggu hingga health check lulus
      todos-service:
        condition: service_healthy

    networks:
      - delcom-microservices-network

  # ============================================================
  # Frontend 4: ReactJS
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: delcom-frontend
    restart: unless-stopped
    expose:
      - "5173"          # Tidak perlu ports karena diakses via Nginx
    networks:
      - delcom-microservices-network
    depends_on:
      - nginx           # Start setelah nginx siap
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================================
# NETWORKS
# ============================================================
networks:
  delcom-microservices-network:
    # Bridge network = jaringan virtual terisolasi di dalam Docker
    # Service dalam network ini bisa saling berkomunikasi menggunakan nama service
    driver: bridge
    name: delcom-microservices-network