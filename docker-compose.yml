x-service-template: &service-template
  restart: unless-stopped
  networks:
    - microservices-network
  environment:
    NODE_ENV: production
    KEYCLOAK_URL: http://keycloak:8080
    KEYCLOAK_REALM: smk-sigumpar
    KEYCLOAK_CLIENT_ID: smk-sigumpar
    DB_PASSWORD: password

services:
  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    networks:
      - microservices-network
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10

  app-db:
    image: postgres:15
    container_name: app-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    networks:
      - microservices-network
    volumes:
      - app_db_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpassword
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - microservices-network
    volumes:
      - ./keycloak-init/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    command: start-dev --import-realm
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/realms/master || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  auth-service:
    <<: *service-template
    build: ./backend/auth-service
    container_name: auth-service
    environment:
      PORT: 3005
      DB_NAME: auth_db
      DB_USER: postgres
      DB_HOST: app-db
      DB_PORT: 5432
      DB_PASSWORD: password
      DATABASE_URL: postgres://postgres:password@app-db:5432/auth_db
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
    depends_on:
      keycloak:
        condition: service_healthy
      app-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3005/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  academic-service:
    <<: *service-template
    build: ./backend/academic-service
    container_name: academic-service
    environment:
      PORT: 3003
      DB_NAME: academic_db
      DB_USER: postgres
      DB_HOST: app-db
      DB_PORT: 5432
      DB_PASSWORD: password
      DATABASE_URL: postgres://postgres:password@app-db:5432/academic_db
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
    depends_on:
      keycloak:
        condition: service_healthy
      app-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3003/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  asset-service:
    <<: *service-template
    build: ./backend/asset-service
    container_name: asset-service
    environment:
      PORT: 3004
      DB_NAME: asset_db
      DB_USER: postgres
      DB_HOST: app-db
      DB_PORT: 5432
      DB_PASSWORD: password
      DATABASE_URL: postgres://postgres:password@app-db:5432/asset_db
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
    depends_on:
      keycloak:
        condition: service_healthy
      app-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3004/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  learning-service:
    <<: *service-template
    build: ./backend/learning-service
    container_name: learning-service
    environment:
      PORT: 3006
      DB_NAME: learning_db
      DB_USER: postgres
      DB_HOST: app-db
      DB_PORT: 5432
      DB_PASSWORD: password
      DATABASE_URL: postgres://postgres:password@app-db:5432/learning_db
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
    depends_on:
      keycloak:
        condition: service_healthy
      app-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3006/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  student-service:
    <<: *service-template
    build: ./backend/student-service
    container_name: student-service
    environment:
      PORT: 3008
      DB_NAME: student_db
      DB_USER: postgres
      DB_HOST: app-db
      DB_PORT: 5432
      DB_PASSWORD: password
      DATABASE_URL: postgres://postgres:password@app-db:5432/student_db
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
    depends_on:
      keycloak:
        condition: service_healthy
      app-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3008/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  vocational-service:
    <<: *service-template
    build: ./backend/vocational-service
    container_name: vocational-service
    environment:
      PORT: 3007
      DB_NAME: vocational_db
      DB_USER: postgres
      DB_HOST: app-db
      DB_PORT: 5432
      DB_PASSWORD: password
      DATABASE_URL: postgres://postgres:password@app-db:5432/vocational_db
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: smk-sigumpar
      KEYCLOAK_CLIENT_ID: smk-sigumpar
    depends_on:
      keycloak:
        condition: service_healthy
      app-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3007/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - microservices-network
    depends_on:
      auth-service:
        condition: service_healthy
      academic-service:
        condition: service_healthy
      learning-service:
        condition: service_healthy
      student-service:
        condition: service_healthy
      asset-service:
        condition: service_healthy
      vocational-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_KEYCLOAK_REALM: smk-sigumpar
        VITE_KEYCLOAK_CLIENT_ID: smk-sigumpar
        VITE_API_URL: http://localhost:8001
    container_name: frontend
    ports:
      - "5173:80"
    networks:
      - microservices-network
    depends_on:
      api-gateway:
        condition: service_healthy

networks:
  microservices-network:
    driver: bridge

volumes:
  keycloak_db_data:
  app_db_data: