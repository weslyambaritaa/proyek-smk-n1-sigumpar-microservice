version: "3.8"

# Template untuk semua backend service yang punya PostgreSQL internal
x-service-template: &service-template
  restart: unless-stopped
  networks:
    - microservices-network
  privileged: true
  environment:
    NODE_ENV: development
    KEYCLOAK_URL: http://keycloak:8080
    KEYCLOAK_REALM: smk-sigumpar
    KEYCLOAK_CLIENT_ID: smk-sigumpar
    DB_PASSWORD: password
    # DB_HOST: localhost karena PostgreSQL diinstal DI DALAM masing-masing kontainer via start.sh
    DB_HOST: localhost

services:
  # --- KEYCLOAK DATABASE ---
  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    networks:
      - microservices-network
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- KEYCLOAK ---
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloakpassword
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - microservices-network
    volumes:
      - ./keycloak-init/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    command: start-dev --import-realm
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /health/live HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && IFS= read -r status <&3 && [[ \"$$status\" == HTTP/* ]]",
        ]
      interval: 10s
      timeout: 5s
      retries: 15

  # --- BACKEND SERVICES ---

  auth-service:
    <<: *service-template
    build: ./backend/auth-service
    container_name: auth-service
    environment:
      PORT: 3005
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: password
      # Auth-service membaca DB Keycloak untuk data user
      KC_DB_HOST: keycloak-db
      KC_DB_NAME: keycloak
      KC_DB_USER: keycloak
      KC_DB_PASSWORD: keycloakpassword
    depends_on:
      keycloak:
        condition: service_healthy

  academic-service:
    <<: *service-template
    build: ./backend/academic-service
    container_name: academic-service
    environment:
      PORT: 3003
      DB_NAME: academic_db
      DB_USER: academic_user
      DB_PASSWORD: password
    depends_on:
      keycloak:
        condition: service_healthy

  asset-service:
    <<: *service-template
    build: ./backend/asset-service
    container_name: asset-service
    environment:
      PORT: 3004
      DB_NAME: asset_db
      DB_USER: asset_user
      DB_PASSWORD: password
    depends_on:
      keycloak:
        condition: service_healthy

  learning-service:
    <<: *service-template
    build: ./backend/learning-service
    container_name: learning-service
    environment:
      PORT: 3006
      DB_NAME: learning_db
      DB_USER: learning_user
      DB_PASSWORD: password
    depends_on:
      keycloak:
        condition: service_healthy

  student-service:
    <<: *service-template
    build: ./backend/student-service
    container_name: student-service
    environment:
      PORT: 3008
      DB_NAME: student_db
      DB_USER: student_user
      DB_PASSWORD: password
    depends_on:
      keycloak:
        condition: service_healthy

  vocational-service:
    <<: *service-template
    build: ./backend/vocational-service
    container_name: vocational-service
    environment:
      PORT: 3007
      DB_NAME: vocational_db
      DB_USER: vocational_user
      DB_PASSWORD: password
    depends_on:
      keycloak:
        condition: service_healthy

  # --- API GATEWAY (NGINX) ---
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - microservices-network
    depends_on:
      - auth-service
      - academic-service
      - asset-service
      - learning-service
      - student-service
      - vocational-service
      - frontend

  # --- FRONTEND ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_KEYCLOAK_URL=http://localhost:8080
      - VITE_KEYCLOAK_REALM=smk-sigumpar
      - VITE_KEYCLOAK_CLIENT_ID=smk-sigumpar

    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  keycloak_db_data:
